name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - run: npm install
      - run: npm run build
      
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
          
  deploy:
    needs: build-and-deploy
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
```

**Step 3 — Set GitHub Pages source to GitHub Actions**

Go to your repo → **Settings → Pages → Source** → change from "Deploy from a branch" to **"GitHub Actions"**

**Step 4 — Commit anything to trigger the build**

Edit any file, commit it. Go to the **Actions** tab and watch the workflow run. In about 90 seconds your app will be live at:
```
https://brucebarnes.github.io/hospital-surge/
